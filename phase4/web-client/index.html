<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GW Web Spike - Fase 4</title>
    <style>
      body { margin: 20px; font-family: Arial, sans-serif; background: #020617; color:#e2e8f0; }
      .layout { display:grid; grid-template-columns:2fr 1fr; gap:16px; }
      .card { background:#0f172a; border:1px solid #1e293b; border-radius:10px; padding:14px; }
      button,input,select { background:#111827; color:#e2e8f0; border:1px solid #334155; border-radius:8px; padding:8px; margin:4px 0; }
      button { cursor:pointer; }
      canvas { border:1px solid #334155; background:#0b1220; }
      #status.ok { color:#22c55e; }
      #status.warn { color:#f59e0b; }
      code { background:#111827; padding:2px 6px; border-radius:6px; }
      ul { max-height:180px; overflow:auto; }
    </style>
  </head>
  <body>
    <h1>GW Web Spike - Fase 4 (auth + observabilidad + gameplay)</h1>
    <div class="layout">
      <section class="card">
        <canvas id="world" width="640" height="360"></canvas>
        <p id="hud">HP: - | Mana: - | NPC HP: - | RTT: -</p>
        <div>
          <button data-move="up">↑</button>
          <button data-move="left">←</button>
          <button data-move="down">↓</button>
          <button data-move="right">→</button>
          <button id="attack">Ataque</button>
          <button id="refresh-metrics">Refrescar métricas</button>
        </div>
      </section>
      <aside class="card">
        <p>WS: <code>ws://localhost:8100/ws</code></p>
        <input id="ws-url" value="ws://localhost:8100/ws" size="34" />
        <input id="token" value="gw-phase4-demo" size="34" />
        <button id="connect">Conectar + Auth</button>
        <p id="status" class="warn">Sin conexión</p>

        <h3>Skills</h3>
        <select id="skill">
          <option value="slash">slash</option>
          <option value="fireball">fireball</option>
        </select>
        <button id="use-skill">Usar skill</button>

        <h3>Inventario</h3>
        <select id="item">
          <option value="potion-small">potion-small</option>
          <option value="ether-small">ether-small</option>
        </select>
        <button id="use-item">Usar item</button>

        <h3>Eventos</h3>
        <ul id="events"></ul>
        <h3>Métricas</h3>
        <pre id="metrics">(sin datos)</pre>
      </aside>
    </div>
    <script src="./main.js"></script>
  </body>
</html>
