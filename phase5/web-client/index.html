<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GW Web Spike - Fase 5</title>
    <style>
      body{margin:20px;background:#020617;color:#e2e8f0;font-family:Arial,sans-serif}
      .layout{display:grid;grid-template-columns:2fr 1fr;gap:16px}
      .card{background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px}
      button,input,select{background:#111827;color:#e2e8f0;border:1px solid #334155;border-radius:8px;padding:8px;margin:4px 0}
      canvas{border:1px solid #334155;background:#0b1220}
      ul{max-height:160px;overflow:auto}
      pre{max-height:130px;overflow:auto}
      #status.ok{color:#22c55e} #status.warn{color:#f59e0b}
    </style>
  </head>
  <body>
    <h1>GW Fase 5: sesión reanudable + leaderboard + combat log</h1>
    <div class="layout">
      <section class="card">
        <canvas id="world" width="640" height="360"></canvas>
        <p id="hud">HP: - | Mana: - | Score: - | NPC HP: -</p>
        <div>
          <button data-move="up">↑</button><button data-move="left">←</button><button data-move="down">↓</button><button data-move="right">→</button>
          <button id="attack">Ataque</button>
        </div>
      </section>
      <aside class="card">
        <input id="ws-url" value="ws://localhost:8110/ws" size="32" />
        <input id="token" value="gw-phase5-demo" size="32" />
        <button id="connect">Conectar + Auth</button>
        <button id="reconnect">Reconectar sesión</button>
        <p id="status" class="warn">Sin conexión</p>

        <select id="skill"><option value="slash">slash</option><option value="fireball">fireball</option></select>
        <button id="use-skill">Usar skill</button>
        <select id="item"><option value="potion-small">potion-small</option><option value="ether-small">ether-small</option></select>
        <button id="use-item">Usar item</button>

        <button id="load-board">Cargar leaderboard</button>
        <button id="load-log">Cargar combat log</button>
        <h3>Leaderboard</h3><pre id="board"></pre>
        <h3>Combat log</h3><pre id="clog"></pre>
        <h3>Eventos</h3><ul id="events"></ul>
      </aside>
    </div>
    <script src="./main.js"></script>
  </body>
</html>
