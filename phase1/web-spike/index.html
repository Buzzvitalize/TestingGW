<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GW Web Spike - Fase 1</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; background: #0f172a; color: #e2e8f0; }
      .card { background: #1e293b; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
      input, button { padding: 8px; border-radius: 8px; border: 1px solid #334155; background: #0b1220; color: #e2e8f0; }
      button { cursor: pointer; }
      .ok { color: #22c55e; }
      .warn { color: #f59e0b; }
      code { background: #0b1220; padding: 2px 6px; border-radius: 6px; }
      ul { margin: 8px 0; }
    </style>
  </head>
  <body>
    <h1>GW Web Spike (Fase 1)</h1>

    <div class="card">
      <h2>Inventario de assets</h2>
      <p id="inventory-summary">Cargando inventario...</p>
      <ul id="top-ext"></ul>
    </div>

    <div class="card">
      <h2>Conectividad WebSocket (prueba manual)</h2>
      <p>URL gateway: <code>ws://localhost:8080</code> (editable abajo)</p>
      <input id="ws-url" size="40" value="ws://localhost:8080" />
      <button id="connect">Conectar</button>
      <button id="ping">Enviar ping</button>
      <p id="ws-status" class="warn">Sin conexión</p>
      <ul id="ws-log"></ul>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
